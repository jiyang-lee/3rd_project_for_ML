services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: heatgrid-tsdb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: heatgrid
      POSTGRES_USER: heatgrid
      POSTGRES_PASSWORD: heatgrid_dev
    volumes:
      - heatgrid_tsdb_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatgrid -d heatgrid"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  heatgrid_tsdb_data:
